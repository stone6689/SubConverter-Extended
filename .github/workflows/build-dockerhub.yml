name: Build and Push Docker image

on:
  push:
    branches:
      - dev  # Only dev branch triggers on push
    tags:
      - 'v*.*.*'  # Tag push triggers master build
    paths-ignore:
      - 'README.md'
      - 'README-*.md'
      - 'docker-compose.yml'
      - '.github/workflows/**'
      - '!.github/workflows/build-dockerhub.yml'
  pull_request:
    branches:
      - master
      - dev
  workflow_dispatch: {}  # Manual trigger
  schedule:
    - cron: '0 19 * * 0'  # Run at 03:00 (UTC+8) on Mondays

permissions:
  contents: write  # Changed from 'read' to enable auto-commit and release creation
  packages: write  # Required for GHCR push

concurrency:
  group: dockerhub-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  prepare:
    name: "🔧 Prepare Metadata"
    runs-on: ubuntu-latest
    # Skip if [skip ci] and ensure schedule only runs on master
    if: github.actor != 'dependabot[bot]' && !contains(github.event.head_commit.message, '[skip ci]') && !contains(github.event.head_commit.message, '[ci skip]') && (github.event_name != 'schedule' || github.ref == 'refs/heads/master')
    outputs:
      sha_short: ${{ steps.vars.outputs.sha_short }}
      version: ${{ steps.version.outputs.version }}
      is_release: ${{ steps.version.outputs.is_release }}
      tags: ${{ steps.meta.outputs.tags }}
      build_date: ${{ steps.build_date.outputs.build_date }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Get short SHA
        id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Determine version
        id: version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            # Tag triggered: use tag as version
            VERSION="${GITHUB_REF#refs/tags/}"
            echo "version=$VERSION" >> $GITHUB_OUTPUT
            echo "is_release=true" >> $GITHUB_OUTPUT
            echo "Detected version from tag: $VERSION"
          elif [[ "${{ github.ref }}" == refs/heads/master ]] && ([[ "${{ github.event_name }}" == "workflow_dispatch" ]] || [[ "${{ github.event_name }}" == "schedule" ]]); then
            # Master manual/schedule trigger: use latest tag as version
            LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
            if [ -n "$LATEST_TAG" ]; then
              VERSION="$LATEST_TAG"
              echo "Detected latest tag: $VERSION"
            else
              # Fallback if no tags exist
              VERSION="master-$(git rev-parse --short HEAD)"
              echo "No tags found, using commit hash: $VERSION"
            fi
            echo "version=$VERSION" >> $GITHUB_OUTPUT
            echo "is_release=true" >> $GITHUB_OUTPUT
            echo "Master branch build (manual/schedule): $VERSION"
          else
            # Dev branch: use "dev"
            echo "version=dev" >> $GITHUB_OUTPUT
            echo "is_release=false" >> $GITHUB_OUTPUT
            echo "Using dev version"
          fi

      - name: Set build date
        id: build_date
        run: echo "build_date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_OUTPUT

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6
        with:
          images: |
            aethersailor/subconverter-extended
            ghcr.io/aethersailor/subconverter-extended
          tags: |
            type=raw,value=latest,enable=${{ steps.version.outputs.is_release == 'true' }}
            type=raw,value=${{ steps.version.outputs.version }},enable=${{ steps.version.outputs.is_release == 'true' }}
            type=raw,value=dev,enable=${{ github.ref == 'refs/heads/dev' }}

  build-amd64:
    name: "🐳 Docker Build (amd64)"
    runs-on: ubuntu-latest
    needs: prepare
    outputs:
      digest: ${{ steps.build_image.outputs.digest }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          token: ${{ github.event_name == 'pull_request' && github.token || secrets.PAT_TOKEN }}
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Build ONCE to builder stage and load to Docker (using Alpine for smaller image)
      - name: Build to builder stage (single build)
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7
        with:
          context: .
          file: ./Dockerfile
          load: true
          tags: subconverter-temp:builder
          target: builder
          build-args: |
            THREADS=16
            SHA=${{ needs.prepare.outputs.sha_short }}
            VERSION=${{ needs.prepare.outputs.version }}
            BUILD_DATE=${{ needs.prepare.outputs.build_date }}
            MIHOMO_REF=Meta
            MIHOMO_CACHE_BUST=${{ github.run_id }}
          cache-from: type=gha,scope=subconverter-alpine
          cache-to: type=gha,mode=max,scope=subconverter-alpine

      # Extract ALL generated files from the single build
      - name: Extract generated files
        run: |
          CONTAINER_ID=$(docker create subconverter-temp:builder)
          
          # Go module files
          docker cp $CONTAINER_ID:/src/bridge/go.mod bridge/go.mod
          docker cp $CONTAINER_ID:/src/bridge/go.sum bridge/go.sum
          docker cp $CONTAINER_ID:/src/bridge/libmihomo.h bridge/libmihomo.h
          
          # Go-generated header files
          docker cp $CONTAINER_ID:/src/src/parser/mihomo_schemes.h src/parser/mihomo_schemes.h
          docker cp $CONTAINER_ID:/src/src/parser/param_compat.h src/parser/param_compat.h
          
          # Header-only libraries
          docker cp $CONTAINER_ID:/src/include/httplib.h include/httplib.h
          docker cp $CONTAINER_ID:/src/include/nlohmann/json.hpp include/nlohmann/json.hpp
          docker cp $CONTAINER_ID:/src/include/inja.hpp include/inja.hpp
          docker cp $CONTAINER_ID:/src/include/jpcre2.hpp include/jpcre2.hpp
          docker cp $CONTAINER_ID:/src/include/quickjspp.hpp include/quickjspp.hpp
          
          # [NEW] Extract Binary for Release (if needed)
          if [ "${{ needs.prepare.outputs.is_release }}" == "true" ]; then
            echo "Extracting binary for release..."
            docker cp $CONTAINER_ID:/src/subconverter ./subconverter
            docker cp $CONTAINER_ID:/src/base ./base
            docker cp $CONTAINER_ID:/runtime-libs ./runtime-libs
            docker cp $CONTAINER_ID:/usr/lib/libmihomo.so ./libmihomo.so
          fi

          docker rm $CONTAINER_ID

      # Package Release Binary
      - name: Package Release Artifact (Linux amd64)
        if: needs.prepare.outputs.is_release == 'true'
        run: |
          mkdir -p SubConverter-Extended
          mv subconverter SubConverter-Extended/
          cp -r base SubConverter-Extended/
          mkdir -p SubConverter-Extended/usr/lib
          mv libmihomo.so SubConverter-Extended/usr/lib/
          cp -r runtime-libs/* SubConverter-Extended/
          
          # Create start script (use /bin/sh for Alpine compatibility)
          cat > SubConverter-Extended/start.sh << 'EOF'
          #!/bin/sh
          set -e
          ROOT="$(CDPATH= cd -- "$(dirname "$0")" && pwd)"
          CONF="${PREF_PATH:-$ROOT/base/pref.toml}"
          CONF_DIR="$(dirname "$CONF")"
          mkdir -p "$CONF_DIR"
          if [ ! -f "$CONF" ] && [ -f "$ROOT/base/pref.example.toml" ]; then
            cp "$ROOT/base/pref.example.toml" "$CONF"
          fi

          if [ -x "$ROOT/lib64/ld-linux-x86-64.so.2" ]; then
            LOADER="$ROOT/lib64/ld-linux-x86-64.so.2"
            LIB_PATH="$ROOT/lib/x86_64-linux-gnu:$ROOT/usr/lib/x86_64-linux-gnu:$ROOT/lib64:$ROOT/lib:$ROOT/usr/lib"
          elif [ -x "$ROOT/lib/x86_64-linux-gnu/ld-linux-x86-64.so.2" ]; then
            LOADER="$ROOT/lib/x86_64-linux-gnu/ld-linux-x86-64.so.2"
            LIB_PATH="$ROOT/lib/x86_64-linux-gnu:$ROOT/usr/lib/x86_64-linux-gnu:$ROOT/lib:$ROOT/usr/lib"
          elif [ -x "$ROOT/lib/ld-linux-aarch64.so.1" ]; then
            LOADER="$ROOT/lib/ld-linux-aarch64.so.1"
            LIB_PATH="$ROOT/lib/aarch64-linux-gnu:$ROOT/usr/lib/aarch64-linux-gnu:$ROOT/lib:$ROOT/usr/lib"
          elif [ -x "$ROOT/lib/aarch64-linux-gnu/ld-linux-aarch64.so.1" ]; then
            LOADER="$ROOT/lib/aarch64-linux-gnu/ld-linux-aarch64.so.1"
            LIB_PATH="$ROOT/lib/aarch64-linux-gnu:$ROOT/usr/lib/aarch64-linux-gnu:$ROOT/lib:$ROOT/usr/lib"
          else
            echo "glibc loader not found in package."
            exit 1
          fi

          exec "$LOADER" --library-path "$LIB_PATH" "$ROOT/subconverter" -f "$CONF"
          EOF
          chmod +x SubConverter-Extended/start.sh
          
          tar -czf SubConverter-Extended-${{ needs.prepare.outputs.version }}-linux-amd64.tar.gz SubConverter-Extended
          rm -rf runtime-libs libmihomo.so

      # Upload Release Artifact
      - name: Upload Artifact (Linux amd64)
        if: needs.prepare.outputs.is_release == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: linux-amd64
          path: SubConverter-Extended-*.tar.gz

      - name: Check for file changes
        id: check_changes
        run: |
          if [ -n "$(git status --porcelain -- bridge/go.mod bridge/go.sum bridge/libmihomo.h src/parser/mihomo_schemes.h src/parser/param_compat.h include/httplib.h include/nlohmann/json.hpp include/inja.hpp include/jpcre2.hpp include/quickjspp.hpp)" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push generated files
        if: steps.check_changes.outputs.changed == 'true' && github.event_name != 'pull_request' && github.ref == 'refs/heads/dev'
        run: |
          BRANCH_NAME="dev"
          echo "Dev branch build, pushing generated files to: $BRANCH_NAME"
          
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add bridge/go.mod bridge/go.sum bridge/libmihomo.h src/parser/mihomo_schemes.h src/parser/param_compat.h include/httplib.h include/nlohmann/json.hpp include/inja.hpp include/jpcre2.hpp include/quickjspp.hpp
          git commit -m "chore: update auto-generated files and header libraries from build [skip ci]"
          
          git fetch --no-tags origin "refs/heads/$BRANCH_NAME:refs/remotes/origin/$BRANCH_NAME"
          git rebase "origin/$BRANCH_NAME"
          git push origin "HEAD:refs/heads/$BRANCH_NAME"

      - name: Report generated file changes outside dev
        if: steps.check_changes.outputs.changed == 'true' && github.event_name != 'pull_request' && github.ref != 'refs/heads/dev'
        run: |
          echo "::warning::Generated file changes were detected on ${GITHUB_REF}, but source updates are committed only to dev."

      - name: Build and push final image
        id: build_image
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7
        with:
          context: .
          file: ./Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          platforms: linux/amd64
          tags: ${{ needs.prepare.outputs.tags }}
          build-args: |
            THREADS=16
            SHA=${{ needs.prepare.outputs.sha_short }}
            VERSION=${{ needs.prepare.outputs.version }}
            BUILD_DATE=${{ needs.prepare.outputs.build_date }}
            MIHOMO_REF=Meta
            MIHOMO_CACHE_BUST=${{ github.run_id }}
          cache-from: type=gha,scope=subconverter-alpine
          cache-to: type=gha,mode=max,scope=subconverter-alpine

  build-arm64:
    name: "🐳 Docker Build (arm64)"
    runs-on: ubuntu-24.04-arm
    needs: prepare
    if: needs.prepare.outputs.is_release == 'true'
    outputs:
      digest: ${{ steps.build_image.outputs.digest }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          token: ${{ github.event_name == 'pull_request' && github.token || secrets.PAT_TOKEN }}
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Build to builder stage FIRST to extract binary (using Alpine for smaller image)
      - name: Build to builder stage (extract binary)
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7
        with:
          context: .
          file: ./Dockerfile
          load: true
          tags: subconverter-temp:arm64-builder
          target: builder
          platforms: linux/arm64
          build-args: |
            THREADS=4
            SHA=${{ needs.prepare.outputs.sha_short }}
            VERSION=${{ needs.prepare.outputs.version }}
            BUILD_DATE=${{ needs.prepare.outputs.build_date }}
            MIHOMO_REF=Meta
            MIHOMO_CACHE_BUST=${{ github.run_id }}
          cache-from: type=gha,scope=subconverter-alpine-arm64
          cache-to: type=gha,mode=max,scope=subconverter-alpine-arm64

      - name: Extract binaries
        run: |
          CONTAINER_ID=$(docker create subconverter-temp:arm64-builder)
          docker cp $CONTAINER_ID:/src/subconverter ./subconverter
          docker cp $CONTAINER_ID:/src/base ./base
          docker cp $CONTAINER_ID:/runtime-libs ./runtime-libs
          docker cp $CONTAINER_ID:/usr/lib/libmihomo.so ./libmihomo.so
          docker rm $CONTAINER_ID
          chmod +x subconverter

      - name: Package Release Artifact (Linux arm64)
        run: |
          mkdir -p SubConverter-Extended
          mv subconverter SubConverter-Extended/
          cp -r base SubConverter-Extended/
          mkdir -p SubConverter-Extended/usr/lib
          mv libmihomo.so SubConverter-Extended/usr/lib/
          cp -r runtime-libs/* SubConverter-Extended/

          cat > SubConverter-Extended/start.sh << 'EOF'
          #!/bin/sh
          set -e
          ROOT="$(CDPATH= cd -- "$(dirname "$0")" && pwd)"
          CONF="${PREF_PATH:-$ROOT/base/pref.toml}"
          CONF_DIR="$(dirname "$CONF")"
          mkdir -p "$CONF_DIR"
          if [ ! -f "$CONF" ] && [ -f "$ROOT/base/pref.example.toml" ]; then
            cp "$ROOT/base/pref.example.toml" "$CONF"
          fi

          if [ -x "$ROOT/lib64/ld-linux-x86-64.so.2" ]; then
            LOADER="$ROOT/lib64/ld-linux-x86-64.so.2"
            LIB_PATH="$ROOT/lib/x86_64-linux-gnu:$ROOT/usr/lib/x86_64-linux-gnu:$ROOT/lib64:$ROOT/lib:$ROOT/usr/lib"
          elif [ -x "$ROOT/lib/x86_64-linux-gnu/ld-linux-x86-64.so.2" ]; then
            LOADER="$ROOT/lib/x86_64-linux-gnu/ld-linux-x86-64.so.2"
            LIB_PATH="$ROOT/lib/x86_64-linux-gnu:$ROOT/usr/lib/x86_64-linux-gnu:$ROOT/lib:$ROOT/usr/lib"
          elif [ -x "$ROOT/lib/ld-linux-aarch64.so.1" ]; then
            LOADER="$ROOT/lib/ld-linux-aarch64.so.1"
            LIB_PATH="$ROOT/lib/aarch64-linux-gnu:$ROOT/usr/lib/aarch64-linux-gnu:$ROOT/lib:$ROOT/usr/lib"
          elif [ -x "$ROOT/lib/aarch64-linux-gnu/ld-linux-aarch64.so.1" ]; then
            LOADER="$ROOT/lib/aarch64-linux-gnu/ld-linux-aarch64.so.1"
            LIB_PATH="$ROOT/lib/aarch64-linux-gnu:$ROOT/usr/lib/aarch64-linux-gnu:$ROOT/lib:$ROOT/usr/lib"
          else
            echo "glibc loader not found in package."
            exit 1
          fi

          exec "$LOADER" --library-path "$LIB_PATH" "$ROOT/subconverter" -f "$CONF"
          EOF
          chmod +x SubConverter-Extended/start.sh

          tar -czf SubConverter-Extended-${{ needs.prepare.outputs.version }}-linux-arm64.tar.gz SubConverter-Extended
          rm -rf runtime-libs libmihomo.so

      - name: Upload Artifact (Linux arm64)
        uses: actions/upload-artifact@v7
        with:
          name: linux-arm64
          path: SubConverter-Extended-*.tar.gz

      - name: Build and push final image
        id: build_image
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7
        with:
          context: .
          file: ./Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          platforms: linux/arm64
          tags: ${{ needs.prepare.outputs.tags }}
          build-args: |
            THREADS=4
            SHA=${{ needs.prepare.outputs.sha_short }}
            VERSION=${{ needs.prepare.outputs.version }}
            BUILD_DATE=${{ needs.prepare.outputs.build_date }}
            MIHOMO_REF=Meta
            MIHOMO_CACHE_BUST=${{ github.run_id }}
          cache-from: type=gha,scope=subconverter-alpine-arm64
          cache-to: type=gha,mode=max,scope=subconverter-alpine-arm64

  build-armv7:
    name: "🐳 Docker Build (armv7)"
    runs-on: ubuntu-latest
    needs: prepare
    if: needs.prepare.outputs.is_release == 'true'
    timeout-minutes: 25
    outputs:
      digest: ${{ steps.build_image.outputs.digest }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          token: ${{ github.event_name == 'pull_request' && github.token || secrets.PAT_TOKEN }}
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push final image
        id: build_image
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7
        with:
          context: .
          file: ./Dockerfile.armv7-cross
          push: ${{ github.event_name != 'pull_request' }}
          platforms: linux/arm/v7
          tags: ${{ needs.prepare.outputs.tags }}
          build-args: |
            THREADS=2
            SHA=${{ needs.prepare.outputs.sha_short }}
            VERSION=${{ needs.prepare.outputs.version }}
            BUILD_DATE=${{ needs.prepare.outputs.build_date }}
            MIHOMO_REF=Meta
            MIHOMO_CACHE_BUST=${{ github.run_id }}
          cache-from: type=gha,scope=subconverter-armv7-cross
          cache-to: type=gha,mode=max,scope=subconverter-armv7-cross

  merge-manifest:
    name: "🔗 Docker Manifest"
    runs-on: ubuntu-latest
    needs: [prepare, build-amd64, build-arm64, build-armv7]
    if: needs.prepare.outputs.is_release == 'true' && github.event_name != 'pull_request'
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Log in to Docker Hub
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push manifest list
        run: |
          TAGS="${{ needs.prepare.outputs.tags }}"
          IMAGE_NAMES=(
            "aethersailor/subconverter-extended"
            "ghcr.io/aethersailor/subconverter-extended"
          )
          for IMAGE_NAME in "${IMAGE_NAMES[@]}"; do
            for TAG in $TAGS; do
              if [[ "$TAG" == "$IMAGE_NAME:"* ]]; then
                docker buildx imagetools create \
                  -t "$TAG" \
                  "${IMAGE_NAME}@${{ needs.build-amd64.outputs.digest }}" \
                  "${IMAGE_NAME}@${{ needs.build-arm64.outputs.digest }}" \
                  "${IMAGE_NAME}@${{ needs.build-armv7.outputs.digest }}"
              fi
            done
          done

  # Release Creation Job (Only on Tag)
  create-release:
    name: "🚀 Release Artifacts"
    runs-on: ubuntu-latest
    needs: [prepare, build-amd64, build-arm64]
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Prepare Release Notes Context
        run: |
          set -euo pipefail

          git fetch --tags --force origin

          CURRENT_TAG="${GITHUB_REF_NAME}"
          CURRENT_COMMIT="$(git rev-list -n 1 "$CURRENT_TAG")"
          PREVIOUS_TAG="$(git describe --tags --abbrev=0 --match 'v[0-9]*.[0-9]*.[0-9]*' "${CURRENT_COMMIT}^" 2>/dev/null || true)"
          EMPTY_TREE="4b825dc642cb6eb9a060e54bf8d69288fbee4904"

          if [ -n "$PREVIOUS_TAG" ]; then
            RANGE_LABEL="$PREVIOUS_TAG..$CURRENT_TAG"
            git log --pretty=format:'- %h %s' "$PREVIOUS_TAG..$CURRENT_TAG" > commits.md
            git diff --name-only "$PREVIOUS_TAG" "$CURRENT_TAG" > changed-files.md
            git diff --stat "$PREVIOUS_TAG" "$CURRENT_TAG" > diffstat.md
          else
            RANGE_LABEL="$CURRENT_TAG"
            git log --pretty=format:'- %h %s' "$CURRENT_TAG" > commits.md
            git diff --name-only "$EMPTY_TREE" "$CURRENT_TAG^{tree}" > changed-files.md
            git diff --stat "$EMPTY_TREE" "$CURRENT_TAG^{tree}" > diffstat.md
          fi

          {
            echo "# Release Context"
            echo
            echo "Current tag: $CURRENT_TAG"
            echo "Previous tag: ${PREVIOUS_TAG:-none}"
            echo "Range: $RANGE_LABEL"
            echo
            echo "## Commits"
            cat commits.md
            echo
            echo
            echo "## Changed files"
            sed 's/^/- /' changed-files.md
            echo
            echo
            echo "## Diff stat"
            cat diffstat.md
          } > release-context.md

          {
            echo "## English"
            echo
            echo "### Changes"
            if [ -s commits.md ]; then
              cat commits.md
            else
              echo "- No commit summary was available."
            fi
            echo
            echo "## 中文"
            echo
            echo "### 变更"
            echo "本次发布包含以下提交："
            if [ -s commits.md ]; then
              cat commits.md
            else
              echo "- 未获取到提交摘要。"
            fi
          } > release-notes.fallback.md

      - name: Check Copilot Token
        id: copilot_token
        env:
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
        run: |
          if [ -n "${COPILOT_GITHUB_TOKEN:-}" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Node.js
        if: steps.copilot_token.outputs.available == 'true'
        uses: actions/setup-node@v6

      - name: Generate Bilingual Release Notes with Copilot
        if: steps.copilot_token.outputs.available == 'true'
        continue-on-error: true
        env:
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          npm install -g @github/copilot

          PROMPT="$(cat <<'EOF'
          You are writing release notes for SubConverter-Extended.

          Use only the release context provided below. Do not invent features, fixes, platforms, or compatibility claims.
          Summarize user-visible changes first. Mention maintenance or dependency changes only when relevant.
          Ignore auto-generated files unless the context shows they affect users.

          Return only Markdown. Do not wrap the answer in a code fence.
          Do not include a downloads section; it will be appended by the workflow.

          Required format:

          ## English

          ### Highlights
          - ...

          ### Changes
          - ...

          ## 中文

          ### 亮点
          - ...

          ### 变更
          - ...

          Omit empty sections. Keep each language concise and accurate.
          EOF
          )"

          PROMPT="$PROMPT

          $(cat release-context.md)"

          copilot -p "$PROMPT" --no-ask-user > release-notes.ai.md
          grep -q '[[:alnum:]]' release-notes.ai.md

      - name: Assemble Release Notes
        run: |
          set -euo pipefail

          if [ -s release-notes.ai.md ]; then
            cp release-notes.ai.md release-notes.md
            echo "Using Copilot-generated release notes."
          else
            cp release-notes.fallback.md release-notes.md
            echo "Using fallback release notes."
          fi

          cat >> release-notes.md <<'EOF'

          ## Downloads

          ### Linux (portable, glibc runtime bundled)
          - **amd64**: `SubConverter-Extended-${{ needs.prepare.outputs.version }}-linux-amd64.tar.gz`
          - **arm64**: `SubConverter-Extended-${{ needs.prepare.outputs.version }}-linux-arm64.tar.gz`
          EOF

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          pattern: 'linux-*'
          merge-multiple: false

      - name: Create Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3
        with:
          files: |
            artifacts/linux-*/*.tar.gz
          body_path: release-notes.md
